<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clash Royale Stats Viewer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Clash Royale Stats Viewer</h1>

    <input type="text" id="playerTag" placeholder="Enter your Player Tag (e.g. PYP8L9YQP)">
    <button id="getStats">Get Stats</button>
    <p> If you dont have an account you can use the tag <code>PYP8L9YQP</code> to test the app. </p>

    <div id="output"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
